<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código Divino — Comprende la Biblia con Claridad y Poder Espiritual</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✝</text></svg>">

      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --ink:       #08080d;
            --ink-mid:   #0f0f1c;
            --gold:      #c9a84c;
            --gold-pale: #e8d5a0;
            --gold-deep: #8a6820;
            --ivory:     #f5f0e8;
            --cream:     #ede5d4;
            --mist:      rgba(201,168,76,0.07);
            --border:    rgba(201,168,76,0.18);
            --text-body: #b8b0a4;
            --text-light:#d6cfc5;
            --red:       #7a1c1c;
            --green:     #1e5c38;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Jost', sans-serif;
            background: var(--ink);
            color: var(--text-body);
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* Noise grain */
        body::after {
            content:''; position:fixed; inset:0;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events:none; z-index:9998; opacity:0.5;
        }

        h1,h2,h3,h4 { font-family:'Cormorant Garamond',serif; line-height:1.15; font-weight:600; }

        .eyebrow {
            font-family:'Jost',sans-serif; font-weight:500;
            font-size:0.68rem; letter-spacing:0.28em; text-transform:uppercase;
            color:var(--gold); display:block; margin-bottom:16px;
        }

        /* ── URGENCY BAR ── */
        .urgency-bar {
            background:var(--red); color:rgba(255,255,255,0.92);
            text-align:center; padding:10px 20px;
            position:fixed; top:0; width:100%; z-index:1000;
            font-size:0.77rem; font-weight:400; letter-spacing:0.06em;
            border-bottom:1px solid rgba(255,255,255,0.07);
        }
        .urgency-bar strong { font-weight:600; }
        .timer-highlight {
            display:inline-block; background:rgba(0,0,0,0.3);
            color:var(--gold-pale); font-family:'Cormorant Garamond',serif;
            font-size:1.05rem; font-weight:600; letter-spacing:0.14em;
            padding:0 10px; border-radius:3px; margin-left:8px; vertical-align:middle;
        }

        /* ── CTA BUTTON ── */
        .cta-btn {
            display:inline-block; position:relative;
            background:linear-gradient(135deg, var(--gold-deep) 0%, var(--gold) 45%, var(--gold-pale) 100%);
            background-size:200% 200%;
            color:var(--ink); font-family:'Jost',sans-serif;
            font-weight:600; font-size:0.82rem; letter-spacing:0.18em;
            text-transform:uppercase; padding:18px 40px; border-radius:2px;
            text-decoration:none; border:none; cursor:pointer; overflow:hidden;
            box-shadow:0 8px 32px rgba(201,168,76,0.28), 0 2px 8px rgba(0,0,0,0.4);
            transition:background-position 0.5s, box-shadow 0.3s, transform 0.2s;
        }
        .cta-btn:hover {
            background-position:100% 0;
            box-shadow:0 12px 44px rgba(201,168,76,0.45), 0 4px 16px rgba(0,0,0,0.5);
            transform:translateY(-2px);
        }
        .cta-btn::after {
            content:''; position:absolute; inset:0;
            background:linear-gradient(to right, transparent, rgba(255,255,255,0.22), transparent);
            transform:translateX(-100%) skewX(-20deg);
        }
        .cta-btn:hover::after { transform:translateX(200%) skewX(-20deg); transition:transform 0.55s ease; }

        .cta-pulse { animation:pulse-gold 2.4s infinite; }
        @keyframes pulse-gold {
            0%   { box-shadow:0 8px 32px rgba(201,168,76,0.28), 0 0 0 0 rgba(201,168,76,0.55); }
            65%  { box-shadow:0 8px 32px rgba(201,168,76,0.28), 0 0 0 20px rgba(201,168,76,0); }
            100% { box-shadow:0 8px 32px rgba(201,168,76,0.28), 0 0 0 0  rgba(201,168,76,0); }
        }

        .cta-block { text-align:center; margin-top:48px; }
        .cta-sub { font-size:0.72rem; opacity:0.5; margin-top:10px; letter-spacing:0.08em; }

        /* ── DIVIDER ── */
        .line-divider {
            width:100%; height:1px; margin:0;
            background:linear-gradient(to right, transparent, var(--border), transparent);
        }

        /* ══════════════════════════════
           HERO
        ══════════════════════════════ */
        .hero {
            padding:110px 24px 80px;
            position:relative; overflow:hidden;
            min-height:100vh;
            display:flex; align-items:center; justify-content:center;
        }

        .hero-bg {
            position:absolute; inset:0;
            background:
                radial-gradient(ellipse 55% 45% at 50% 20%, rgba(201,168,76,0.09) 0%, transparent 65%),
                radial-gradient(ellipse 80% 40% at 50% 100%, var(--ink) 0%, transparent 70%),
                radial-gradient(ellipse 30% 30% at 20% 60%, rgba(201,168,76,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 30% 30% at 80% 40%, rgba(201,168,76,0.04) 0%, transparent 60%),
                linear-gradient(160deg, #0a0818 0%, #080d1a 40%, #06090f 100%);
        }

        /* Starfield */
        .hero-bg::before {
            content:'';
            position:absolute; inset:0;
            background-image:
                radial-gradient(1px 1px at 15% 18%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 28% 8%,  rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 42% 22%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 58% 12%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 72% 25%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 9%,  rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 92% 32%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 8%  45%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 35% 38%, rgba(255,255,255,0.25) 0%, transparent 100%),
                radial-gradient(1px 1px at 65% 42%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 50% 5%, rgba(201,168,76,0.6) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 22% 30%, rgba(201,168,76,0.4) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 78% 15%, rgba(201,168,76,0.4) 0%, transparent 100%);
        }

        /* Light rays from center-bottom */
        .hero-bg::after {
            content:'';
            position:absolute; inset:0;
            background:
                conic-gradient(from 260deg at 50% 110%,
                    transparent 0deg,
                    rgba(201,168,76,0.03) 8deg,
                    transparent 16deg,
                    transparent 30deg,
                    rgba(201,168,76,0.02) 38deg,
                    transparent 46deg,
                    transparent 60deg,
                    rgba(201,168,76,0.03) 68deg,
                    transparent 76deg,
                    transparent 100deg
                );
        }

        /* Rotating geometry */
        .hero-geo {
            position:absolute; top:50%; left:50%;
            transform:translate(-50%,-50%);
            width:600px; height:600px; pointer-events:none;
        }
        .hero-geo circle { animation:rot 50s linear infinite; transform-origin:300px 300px; }
        .hero-geo circle:nth-child(2) { animation-duration:80s; animation-direction:reverse; }

        @keyframes rot { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

        .hero-inner {
            position:relative; z-index:2;
            display:grid; grid-template-columns:1fr;
            gap:48px; max-width:1100px; width:100%;
            align-items:center; text-align:center;
        }

        @media(min-width:900px) {
            .hero-inner { grid-template-columns:1fr 1fr; text-align:left; }
        }

        .hero-text {}
        .hero-text h1 {
            font-size:clamp(2.8rem,5.5vw,5rem); font-weight:300;
            color:var(--ivory); text-shadow:0 4px 30px rgba(0,0,0,0.7);
            margin-bottom:22px;
        }
        .hero-text h1 em { font-style:italic; color:var(--gold); }
        .hero-text p {
            font-size:clamp(1rem,1.8vw,1.15rem); font-weight:300;
            color:var(--text-body); max-width:500px;
        }
        @media(max-width:899px){ .hero-text p { margin:0 auto; } }

        .hero-book {
            display:flex; justify-content:center; align-items:center;
        }
        .hero-book img {
            max-width:280px;
            max-height:460px;
            width:100%;
            object-fit:contain;
            filter:drop-shadow(0 30px 50px rgba(0,0,0,0.6)) drop-shadow(0 0 40px rgba(201,168,76,0.15));
            animation:float 5s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform:translateY(0); }
            50%      { transform:translateY(-12px); }
        }

        .hero-stats {
            display:flex; gap:32px; margin-top:36px; flex-wrap:wrap;
        }
        @media(max-width:899px){ .hero-stats { justify-content:center; } }

        .stat-item { }
        .stat-num {
            font-family:'Cormorant Garamond',serif;
            font-size:2.2rem; font-weight:700; color:var(--gold); line-height:1;
        }
        .stat-label {
            font-size:0.68rem; letter-spacing:0.15em; text-transform:uppercase;
            display:block; margin-top:4px; opacity:0.55;
        }

        /* ══════════════════════════════
           FOR WHOM
        ══════════════════════════════ */
        .for-whom {
            padding:90px 24px;
            background:var(--ink-mid);
        }
        .section-wrap { max-width:1000px; margin:0 auto; }
        .section-header { text-align:center; margin-bottom:56px; }
        .section-header h2 {
            font-size:clamp(2rem,4vw,3rem); font-weight:300; color:var(--ivory);
        }

        .whom-grid {
            display:grid; grid-template-columns:1fr; gap:2px;
        }
        @media(min-width:640px){ .whom-grid { grid-template-columns:1fr 1fr; } }

        .whom-item {
            display:flex; align-items:flex-start; gap:18px;
            padding:28px 24px; background:rgba(255,255,255,0.02);
            border:1px solid transparent;
            transition:background 0.3s, border-color 0.3s;
        }
        .whom-item:hover { background:var(--mist); border-color:var(--border); }

        .whom-check {
            width:24px; height:24px; border-radius:50%;
            background: rgba(201,168,76,0.12);
            border:1px solid var(--gold);
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0; margin-top:2px;
            color:var(--gold); font-size:0.75rem; font-weight:700;
        }
        .whom-item p { font-size:0.97rem; font-weight:300; }

        /* ══════════════════════════════
           PROBLEM
        ══════════════════════════════ */
        .problem {
            padding:90px 24px;
            background:
                linear-gradient(180deg, rgba(8,8,13,0.92) 0%, rgba(8,8,13,0.88) 100%),
                repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(201,168,76,0.02) 60px, rgba(201,168,76,0.02) 61px),
                repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(201,168,76,0.02) 60px, rgba(201,168,76,0.02) 61px);
        }
        .problem-content { max-width:760px; margin:0 auto; text-align:center; }
        .problem-content h2 {
            font-size:clamp(2rem,4vw,3.2rem); font-weight:300; color:var(--ivory); margin-bottom:20px;
        }
        .problem-content > p { margin-bottom:48px; font-weight:300; max-width:600px; margin-left:auto; margin-right:auto; }

        .quotes-grid { display:grid; gap:20px; margin-top:40px; }
        @media(min-width:768px){ .quotes-grid { grid-template-columns:1fr 1fr; } }

        .quote-card {
            background:rgba(255,255,255,0.025); border:1px solid var(--border);
            border-top:2px solid var(--gold); padding:36px 32px; text-align:left;
            position:relative;
        }
        .quote-card::before {
            content:'\201C'; font-family:'Cormorant Garamond',serif;
            font-size:5rem; color:var(--gold); opacity:0.15;
            position:absolute; top:6px; left:18px; line-height:1;
        }
        .quote-card p {
            font-family:'Cormorant Garamond',serif; font-size:1.2rem;
            font-style:italic; color:var(--text-light); line-height:1.6;
        }

        /* ══════════════════════════════
           BENEFITS
        ══════════════════════════════ */
        .benefits { padding:90px 24px; background:var(--ink); }

        .benefits-grid {
            display:grid; grid-template-columns:1fr; gap:2px;
            max-width:1000px; margin:0 auto;
            border:1px solid var(--border);
        }
        @media(min-width:768px){ .benefits-grid { grid-template-columns:repeat(3,1fr); } }

        .benefit-card {
            background:rgba(255,255,255,0.018); padding:48px 32px;
            transition:background 0.3s;
        }
        .benefit-card:hover { background:rgba(201,168,76,0.04); }
        .benefit-num {
            font-family:'Cormorant Garamond',serif; font-size:3.5rem;
            font-weight:300; color:rgba(201,168,76,0.1); line-height:1; margin-bottom:18px;
        }
        .benefit-card h3 { font-size:1.35rem; font-weight:600; color:var(--gold-pale); margin-bottom:12px; }
        .benefit-card p { font-size:0.94rem; font-weight:300; line-height:1.8; }

        /* ══════════════════════════════
           TESTIMONIALS
        ══════════════════════════════ */
        .testimonials { padding:90px 24px; background:var(--ink-mid); }

        .testi-grid {
            display:grid; grid-template-columns:1fr; gap:20px;
            max-width:1000px; margin:0 auto;
        }
        @media(min-width:768px){ .testi-grid { grid-template-columns:repeat(3,1fr); } }

        .testi-card {
            background:rgba(255,255,255,0.025); border:1px solid var(--border);
            padding:32px 28px; position:relative;
        }
        .testi-stars { color:var(--gold); font-size:0.8rem; letter-spacing:2px; margin-bottom:16px; }
        .testi-text {
            font-family:'Cormorant Garamond',serif; font-size:1.1rem;
            font-style:italic; color:var(--text-light); line-height:1.65; margin-bottom:22px;
        }
        .testi-author {
            display:flex; align-items:center; gap:12px;
            border-top:1px solid rgba(255,255,255,0.06); padding-top:18px;
        }
        .testi-avatar {
            width:38px; height:38px; border-radius:50%;
            background:linear-gradient(135deg, var(--gold-deep), var(--gold));
            display:flex; align-items:center; justify-content:center;
            font-family:'Cormorant Garamond',serif; font-size:1rem;
            font-weight:600; color:var(--ink); flex-shrink:0;
        }
        .testi-name { font-size:0.85rem; font-weight:500; color:var(--ivory); }
        .testi-loc { font-size:0.72rem; opacity:0.45; letter-spacing:0.06em; }

        /* ══════════════════════════════
           WHAT'S INCLUDED
        ══════════════════════════════ */
        .included { padding:90px 24px; background:var(--ink); }

        .included-inner {
            max-width:820px; margin:0 auto;
            display:grid; gap:12px;
        }
        .included-item {
            display:flex; align-items:flex-start; gap:20px;
            padding:24px 28px; background:rgba(255,255,255,0.02);
            border:1px solid var(--border); border-left:3px solid var(--gold);
        }
        .included-icon {
            font-size:1.4rem; flex-shrink:0; margin-top:2px;
        }
        .included-item h4 { font-size:1.1rem; color:var(--gold-pale); margin-bottom:5px; }
        .included-item p { font-size:0.9rem; font-weight:300; }

        /* ══════════════════════════════
           FAQ
        ══════════════════════════════ */
        .faq { padding:90px 24px; background:var(--ink); }

        .faq-list { max-width:760px; margin:0 auto; }

        .faq-item {
            border-bottom:1px solid var(--border);
        }
        .faq-item:first-child { border-top:1px solid var(--border); }

        .faq-q {
            width:100%; background:none; border:none; cursor:pointer;
            display:flex; justify-content:space-between; align-items:center;
            padding:22px 4px; text-align:left; gap:16px;
            color:var(--text-light); font-family:'Jost',sans-serif;
            font-size:1rem; font-weight:400; letter-spacing:0.02em;
            transition:color 0.2s;
        }
        .faq-q:hover { color:var(--gold-pale); }
        .faq-q.open { color:var(--gold); }

        .faq-icon {
            font-size:1.4rem; font-weight:300; color:var(--gold);
            flex-shrink:0; line-height:1; transition:transform 0.3s ease;
        }
        .faq-q.open .faq-icon { transform:rotate(45deg); }

        .faq-a {
            max-height:0; overflow:hidden;
            transition:max-height 0.35s ease, padding 0.3s ease;
        }
        .faq-a.open { max-height:200px; padding-bottom:20px; }
        .faq-a p {
            font-size:0.95rem; font-weight:300; line-height:1.8;
            padding:0 4px; color:var(--text-body);
        }

        /* ══════════════════════════════
           OFFER
        ══════════════════════════════ */
        .offer { padding:90px 24px; display:flex; justify-content:center; background:var(--ink-mid); }

        .offer-box {
            background:var(--ivory); color:var(--ink);
            max-width:660px; width:100%;
            padding:60px 48px; text-align:center;
            box-shadow:0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(201,168,76,0.35);
        }
        @media(max-width:600px){ .offer-box { padding:40px 24px; } }

        .offer-box .eyebrow { color:var(--gold-deep); }
        .offer-box h2 { font-size:clamp(2rem,4vw,2.8rem); font-weight:300; color:var(--ink); margin-bottom:8px; }
        .offer-subtitle { font-size:0.92rem; color:#666; margin-bottom:32px; }

        .offer-book-img {
            max-width:240px; margin:0 auto 36px;
        }
        .offer-book-img img {
            width:100%;
            filter:drop-shadow(0 20px 35px rgba(0,0,0,0.22));
        }

        .bonuses {
            background:var(--cream); padding:24px 28px;
            margin-bottom:36px; text-align:left;
            border-top:2px solid var(--gold);
        }
        .bonuses h4 {
